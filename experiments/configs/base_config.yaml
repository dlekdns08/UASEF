uqm:
  alpha: 0.10
  scoring_method: auto
  consistency_n: 5
  holdout_fraction: 0.2
data:
  n_calibration: 500
  n_test_per_scenario: 50
  calibration_split: train
  test_split: test
  seed: 42
  distribution_source: medqa
  include_pubmedqa: false
backends:
- lmstudio
- openai
output:
  results_dir: results
rtc:
  CRITICAL: 0.60
  HIGH: 0.75
  MODERATE: 1.00
  LOW: 1.30
entropy_threshold: 0.6045
ede:
  t1_weight: 0.4
  entropy_boost: 0.15
