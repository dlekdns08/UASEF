uqm:
  alpha: 0.1
  scoring_method: logprob
  consistency_n: 5
  holdout_fraction: 0.2
  prompt_mode: neutral
  strict: false
data:
  n_calibration: 500
  n_test_per_scenario: 200
  calibration_split: train
  test_split: test
  seed: 42
  distribution_source: medqa
  include_pubmedqa: false
backends:
- lmstudio
- openai
output:
  results_dir: results
rtc:
  CRITICAL: 0.55
  HIGH: 0.7
  MODERATE: 0.9
  LOW: 1.2
scenario_multipliers:
  emergency: 0.9
  rare_disease: 0.9
  multimorbidity: 1.0
  routine: 1.0
entropy_threshold: 0.5006
ede:
  t1_weight: 0.5
  entropy_boost: 0.2
  confidence_threshold: 0.6
  decision_rule: confidence
hybrid:
  diversity_weight: 1.0
  entropy_weight: 0.0
stratified_alphas:
  CRITICAL: 0.001
  HIGH: 0.01
  MODERATE: 0.05
  LOW: 0.1
costs:
  CRITICAL:
    miss: 1000.0
    over_esc: 1.0
  HIGH:
    miss: 100.0
    over_esc: 1.0
  MODERATE:
    miss: 10.0
    over_esc: 1.0
  LOW:
    miss: 1.0
    over_esc: 1.0
multi_trigger:
  enabled: false
  combination: harmonic
  combined_alpha: 0.05
