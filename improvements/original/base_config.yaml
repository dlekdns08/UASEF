uqm:
  alpha: 0.05
  scoring_method: auto
  consistency_n: 5
  holdout_fraction: 0.2
data:
  n_calibration: 30
  n_test_per_scenario: 3
  calibration_split: train
  test_split: test
  seed: 42
  distribution_source: medqa
  include_pubmedqa: false
backends:
- lmstudio
- openai
output:
  results_dir: results
rtc:
  CRITICAL: 0.5
  HIGH: 0.7
  MODERATE: 0.9
  LOW: 1.2
entropy_threshold: 0.6045
ede:
  t1_weight: 0.2
  entropy_boost: 0.05
